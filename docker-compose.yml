services:
  db:
    image: postgres:16-alpine
    container_name: nachalat-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nachalat
    ports:
      - "5433:5432"
    volumes:
      - nachalat_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nachalat"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  nachalat_db_data:
